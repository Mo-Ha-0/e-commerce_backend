services:
    app:
        build: .
        env_file: .env
        environment:
            PORT: 3000
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
            minio:
                condition: service_healthy
        restart: unless-stopped
        healthcheck:
            test:
                [
                    'CMD',
                    'wget',
                    '--no-verbose',
                    '--tries=1',
                    '--spider',
                    'http://localhost:3000/health',
                ]
            interval: 10s
            timeout: 5s
            retries: 3
            start_period: 15s
        deploy:
            resources:
                limits:
                    cpus: '1.00'
                    memory: 256M
                reservations:
                    cpus: '0.25'
                    memory: 128M

    nginx:
        image: nginx:1.25-alpine
        ports:
            - '8080:8080'
        volumes:
            - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            app:
                condition: service_healthy
        restart: unless-stopped
        healthcheck:
            test:
                [
                    'CMD',
                    'wget',
                    '--no-verbose',
                    '--tries=1',
                    '--spider',
                    'http://localhost:8080/health',
                ]
            interval: 15s
            timeout: 5s
            retries: 3
            start_period: 10s

    postgres:
        image: postgres:15-alpine
        environment:
            POSTGRES_DB: ecommerce_database_for_the_legends_of_the_workd
            POSTGRES_USER: mrmohammed
            POSTGRES_PASSWORD: youruncletruepassword
        ports:
            - '5433:5432'
        volumes:
            - postgres_data:/var/lib/postgresql/data
        healthcheck:
            test:
                [
                    'CMD-SHELL',
                    'pg_isready -U mrmohammed -d ecommerce_database_for_the_legends_of_the_workd',
                ]
            interval: 10s
            timeout: 5s
            retries: 5
            start_period: 10s

    minio:
        image: minio/minio:latest
        ports:
            - '9000:9000'
            - '9001:9001'
        environment:
            MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
            MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
        volumes:
            - minio_data:/data
        command: server /data --console-address ":9001"
        healthcheck:
            test: ['CMD', 'mc', 'ready', 'local']
            interval: 10s
            timeout: 5s
            retries: 5

    redis:
        image: redis:8.4-alpine
        ports:
            - '6379:6379'
        volumes:
            - redis_data:/data
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 10s
            timeout: 5s
            retries: 5

    prometheus:
        image: prom/prometheus:latest
        ports:
            - '9090:9090'
        volumes:
            - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
            - prometheus_data:/prometheus
        depends_on:
            app:
                condition: service_healthy
        restart: unless-stopped

    grafana:
        image: grafana/grafana:latest
        ports:
            - '3001:3000'
        environment:
            GF_SECURITY_ADMIN_USER: admin
            GF_SECURITY_ADMIN_PASSWORD: admin
        volumes:
            - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
            - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
            - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
            - grafana_data:/var/lib/grafana
        depends_on:
            prometheus:
                condition: service_started
        restart: unless-stopped

volumes:
    postgres_data:
    redis_data:
    minio_data:
    prometheus_data:
    grafana_data:
