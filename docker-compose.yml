services:
    app:
        build: .
        env_file: .env
        environment:
            PORT: 3000
        depends_on:
            - postgres
            - redis
        restart: unless-stopped
        deploy:
            replicas: 3
            resources:
                limits:
                    cpus: '1.00'
                    memory: 256M
                reservations:
                    cpus: '0.25'
                    memory: 128M

    nginx:
        image: nginx:1.25-alpine
        ports:
            - '8080:8080'
        volumes:
            - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
        depends_on:
            - app
        restart: unless-stopped
        # healthcheck:
        #     test: ['CMD', 'wget', '-qO-', 'http://localhost/health']
        #     interval: 15s
        #     timeout: 5s
        #     retries: 3
        #     start_period: 10s

    postgres:
        image: postgres:15-alpine
        environment:
            POSTGRES_DB: ecommerce_database_for_the_legends_of_the_workd
            POSTGRES_USER: mrmohammed
            POSTGRES_PASSWORD: youruncletruepassword
        ports:
            - '5433:5432'
        volumes:
            - postgres_data:/var/lib/postgresql/data

    redis:
        image: redis:8.4-alpine
        ports:
            - '6379:6379'
        volumes:
            - redis_data:/data
        healthcheck:
            test: ['CMD', 'redis-cli', 'ping']
            interval: 60s
            timeout: 5s
            retries: 5

volumes:
    postgres_data:
    redis_data:
